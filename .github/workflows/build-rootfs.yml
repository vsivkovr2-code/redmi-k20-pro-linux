name: Build RootFS
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: |
          mkdir -p rootfs
          docker run --rm -v $PWD/rootfs:/mnt/rootfs archlinux bash -c "
            pacman -Syu --noconfirm &&
            pacman -S base plasma-mobile mesa networkmanager --noconfirm &&
            cp -a / /mnt/rootfs/
          "
      - run: cd rootfs && tar -czf ../rootfs.tar.gz . && cd ..
      - uses: actions/upload-artifact@v4
        with:
          name: rootfs
          path: rootfs.tar.gz
