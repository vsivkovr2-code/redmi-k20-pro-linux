name: Build RootFS
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: |
          mkdir rootfs
          docker run --rm -v $PWD/rootfs:/rootfs archlinux bash -c "
            pacman -Syu --noconfirm &&
            pacman -S base plasma-mobile mesa networkmanager --noconfirm &&
            cd / && tar --exclude='/proc/*' --exclude='/sys/*' --exclude='/dev/*' --exclude='/run/*' -czf /rootfs/rootfs.tar.gz .
          "
      - uses: actions/upload-artifact@v4
        with:
          name: rootfs
          path: rootfs/rootfs.tar.gz
